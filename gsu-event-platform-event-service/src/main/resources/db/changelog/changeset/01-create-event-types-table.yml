databaseChangeLog:
  - changeSet:
      id: 01-create-event-types-table
      author: Alexander Dudkin
      changes:
        - createTable:
            tableName: event_types
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false
